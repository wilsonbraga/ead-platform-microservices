# ============================================================
# Configurań§es da AplicańŃo
# ============================================================
spring.application.name=authuser
server.port=8080

# ============================================================
# Banco de Dados (PostgreSQL)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/authuser_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ead_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ead_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ============================================================
# Log
# ============================================================
logging.level.com.wilson.ead=DEBUG
logging.level.org.springframework.amqp=INFO