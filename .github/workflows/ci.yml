name: CI - EAD Platform Microservices

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ============================================================
  # Job 1 - Build de cada microsserviço
  # ============================================================
  build:
    name: Build - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [authuser, course, notification]
      fail-fast: false

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build - ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: ./mvnw clean package -DskipTests -B

      - name: Salvar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  # ============================================================
  # Job 2 - Validar que o Docker Compose está correto
  # ============================================================
  validate-docker:
    name: Validar Docker Compose
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar sintaxe do docker-compose.yml
        run: docker compose config --quiet

  # ============================================================
  # Job 3 - Resumo final
  # ============================================================
  summary:
    name: Resumo do Pipeline
    runs-on: ubuntu-latest
    needs: [build, validate-docker]
    if: always()

    steps:
      - name: Resultado
        run: |
          echo "## Resultado do Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Serviços: authuser, course, notification" >> $GITHUB_STEP_SUMMARY