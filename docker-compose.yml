version: '3.8'

services:

  # ============================================================
  # Banco de dados PostgreSQL compartilhado (um por serviço em prod,
  # mas aqui usamos um único container com múltiplos databases para dev)
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: ead-postgres
    environment:
      POSTGRES_USER: ead_user
      POSTGRES_PASSWORD: ead_pass
      POSTGRES_MULTIPLE_DATABASES: authuser_db,course_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh
    ports:
      - "5434:5432"
    networks:
      - ead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ead_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # RabbitMQ - Mensageria entre os microsserviços
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ead-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI: http://localhost:15672
    networks:
      - ead-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Serviço: authuser (porta 8080)
  # ============================================================
  authuser:
    build:
      context: ./authuser
      dockerfile: Dockerfile
    container_name: ead-authuser
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authuser_db
      SPRING_DATASOURCE_USERNAME: ead_user
      SPRING_DATASOURCE_PASSWORD: ead_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ead-network
    restart: unless-stopped

  # ============================================================
  # Serviço: course (porta 8081)
  # ============================================================
  course:
    build:
      context: ./course
      dockerfile: Dockerfile
    container_name: ead-course
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/course_db
      SPRING_DATASOURCE_USERNAME: ead_user
      SPRING_DATASOURCE_PASSWORD: ead_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ead-network
    restart: unless-stopped

  # ============================================================
  # Serviço: notification (porta 8082)
  # ============================================================


# ============================================================
# Volumes e redes
# ============================================================
volumes:
  postgres_data:
    driver: local

networks:
  ead-network:
    driver: bridge